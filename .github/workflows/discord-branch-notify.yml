name: Notify Discord via Bot

on:
  push:
    branches:
      - develop
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Message
        run: |
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          COMPARE="${{ github.event.compare }}"

          COMMITS_JSON='${{ toJson(github.event.commits) }}'
          COUNT=${{ github.event.commits && github.event.commits.size || 1 }}
          COMMITS=$(echo "$COMMITS_JSON" | jq -r '
            .[:5]
            | map("`" + (.id[0:7]) + "` - " + (.message | split("\n")[0]))
            | join("\n")
          ')

          if [ "$COUNT" -gt 5 ]; then
            REMAIN=$((COUNT - 5))
            COMMITS="$COMMITS\n\n+ $REMAIN more commits..."
          fi

          if [ "$BRANCH" = "main" ]; then
            COLOR=15158332   # 빨강
            MENTION="@everyone"
            PARSE='["everyone"]'
          else
            COLOR=3447003    # 파랑
            MENTION=""
            PARSE='[]'
          fi

          TITLE="$COUNT new commits pushed to $BRANCH by $ACTOR"

          payload=$(jq -n \
            --arg title "$TITLE" \
            --arg branch "$BRANCH" \
            --arg commits "$COMMITS" \
            --arg repo "$REPO" \
            --arg compare "$COMPARE" \
            --arg mention "$MENTION" \
            --argjson color "$COLOR" \
            --argjson parse "$PARSE" \
            '{
              content: $mention,
              embeds: [{
                title: $title,
                color: $color,
                fields: [
                  {name: "📦 Repository", value: $repo, inline: true},
                  {name: "🌿 Branch", value: $branch, inline: true},
                  {name: "📝 Commits", value: $commits},
                  {name: "🔗 Link", value: $compare}
                ],
                footer: {
                  text: "GitHub → Discord 자동 알림"
                },
                timestamp: now | todate
              }],
              allowed_mentions: {parse: $parse}
            }')

          curl -X POST "https://discord.com/api/v10/channels/${{ secrets.DISCORD_CHANNEL_ID }}/messages" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$payload"
